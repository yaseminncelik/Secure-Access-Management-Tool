<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Logs - Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --success-text: #34d399;
            --error-text: #f87171;
            --warning-text: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .navbar {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-text);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .main-wrapper {
            margin-top: 80px;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            margin-left: auto;
            margin-right: auto;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .filter-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .filter-group select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
        }

        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: rgba(0, 0, 0, 0.2);
        }

        th {
            padding: 1.25rem 1.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-allowed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-text);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-denied {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-text);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-invalid {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning-text);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .url-cell {
            font-family: monospace;
            font-size: 0.85rem;
            color: #60a5fa;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .navbar { padding: 1rem; }
            .main-wrapper { padding: 1rem; margin-top: 100px; }
            .filters { flex-direction: column; }
            .filter-group { width: 100%; }
            .filter-group select { width: 100%; }
            .url-cell { max-width: 150px; }
            th, td { padding: 0.75rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-links">
            <h2 style="font-size:1.2rem;display:flex;align-items:center;gap:8px;margin-right:2rem">
                <svg style="width:20px;height:20px;color:var(--accent-color)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Secure Access
            </h2>
            <a href="/login">Login</a>
            <a href="/users">Users</a>
            <a href="/firewall-test">Policy Simulator</a>
            <a href="/access-logs" class="active">Access Logs</a>
        </div>
        <div class="user-actions">
            <div style="color: var(--text-secondary); font-size: 0.9rem;"><span id="usernameDisplay">Loading...</span></div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="header">
            <h1>Access Logs</h1>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Audit trail of all user access attempts</p>
        </div>

        <div class="stats" id="statsContainer">
            <div class="stat-card">
                <div class="stat-value" id="totalAttempts">-</div>
                <div class="stat-label">Total Attempts</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="allowedCount">-</div>
                <div class="stat-label">Allowed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="deniedCount">-</div>
                <div class="stat-label">Denied</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label>Status:</label>
                <select id="statusFilter" onchange="loadAccessLogs()">
                    <option value="">All</option>
                    <option value="ALLOWED">Allowed</option>
                    <option value="DENIED">Denied</option>
                    <option value="INVALID_TOKEN">Invalid Token</option>
                    <option value="EXPIRED_TOKEN">Expired Token</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>URL Accessed</th>
                        <th>Method</th>
                        <th>Status</th>
                        <th>Reason</th>
                        <th>IP Address</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('currentUser'));
            if (user) {
                if (user.role !== 'ADMIN') {
                    window.location.href = '/my-access';
                    return;
                }
                document.getElementById('usernameDisplay').textContent = user.username;
                loadAccessLogs();
            } else {
                window.location.href = '/login';
            }
        });

        function loadAccessLogs() {
            const headers = {};
            const token = sessionStorage.getItem('token');
            if (token) {
                headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;
            }

            fetch('/api/access-logs/all', { headers })
                .then(response => {
                    if (response.status === 401 || response.status === 403) {
                        logout();
                        throw new Error('Unauthorized');
                    }
                    return response.json();
                })
                .then(data => {
                    let logs = data || [];
                    const statusFilter = document.getElementById('statusFilter').value;

                    if (statusFilter) {
                        logs = logs.filter(log => log.status === statusFilter);
                    }

                    // Calculate stats
                    const total = logs.length;
                    const allowed = logs.filter(l => l.status === 'ALLOWED').length;
                    const denied = logs.filter(l => l.status === 'DENIED').length;

                    document.getElementById('totalAttempts').textContent = total;
                    document.getElementById('allowedCount').textContent = allowed;
                    document.getElementById('deniedCount').textContent = denied;

                    // Populate table
                    const tbody = document.getElementById('logsTableBody');
                    tbody.innerHTML = '';

                    if (logs.length > 0) {
                        logs.forEach(log => {
                            const row = document.createElement('tr');
                            const timestamp = new Date(log.createdAt).toLocaleString();
                            const statusClass = log.status === 'ALLOWED' ? 'status-allowed' :
                                              log.status === 'DENIED' ? 'status-denied' : 'status-invalid';

                            row.innerHTML = `
                                <td><span style="color:var(--text-secondary);font-family:monospace">#${log.id}</span></td>
                                <td><strong>${log.username}</strong></td>
                                <td><span class="url-cell" title="${log.requestedUrl}">${log.requestedUrl}</span></td>
                                <td><span style="color:#60a5fa;font-weight:600">${log.httpMethod}</span></td>
                                <td><span class="status-badge ${statusClass}">${log.status}</span></td>
                                <td><span style="color:var(--text-secondary);font-size:0.85rem">${log.reason}</span></td>
                                <td><span style="font-family:monospace;font-size:0.85rem;color:var(--text-secondary)">${log.ipAddress || '-'}</span></td>
                                <td><span style="font-size:0.85rem;color:var(--text-secondary)">${timestamp}</span></td>
                            `;
                            tbody.appendChild(row);
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="8" class="empty-message">No access logs found.</td></tr>';
                    }
                })
                .catch(err => {
                    console.error('Error loading access logs:', err);
                    document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="8" class="empty-message">Error loading logs.</td></tr>';
                });
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = '/login';
        }
    </script>
</body>
</html>
