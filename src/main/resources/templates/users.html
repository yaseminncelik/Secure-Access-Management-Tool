<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-text: #34d399;
            --error-text: #f87171;
            --warning-text: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #currentUser {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-text);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .main-wrapper {
            margin-top: 80px;
            width: 100%;
            max-width: 1100px;
            padding: 2rem;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeIn 0.4s ease-out;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-color) 0%, #4f46e5 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: rgba(0, 0, 0, 0.2);
        }

        th {
            padding: 1.25rem 1.5rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;
        }

        .badge-admin { background: rgba(245, 158, 11, 0.1); color: var(--warning-text); border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-user { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-active { background: rgba(16, 185, 129, 0.1); color: var(--success-text); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-inactive { background: rgba(239, 68, 68, 0.1); color: var(--error-text); border: 1px solid rgba(239, 68, 68, 0.2); }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.4rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-action.delete:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: var(--error-text);
        }

        .btn-action.edit:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
            color: #60a5fa;
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal h2 {
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
        }

        .modal .form-group { margin-bottom: 1.25rem; }
        .modal label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.85rem; }
        .modal input, .modal select {
            width: 100%; padding: 0.75rem; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color);
            border-radius: 6px; color: var(--text-primary);
        }
        .modal input:focus, .modal select:focus { outline: none; border-color: var(--accent-color); }
        .modal select option { background: #1e293b; }

        .modal-actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn-cancel {
            background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color);
            padding: 0.75rem; border-radius: 6px; width: 100%; cursor: pointer; transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
        .btn-save {
            background: var(--accent-color); color: white; border: none; padding: 0.75rem;
            border-radius: 6px; width: 100%; cursor: pointer; transition: all 0.2s;
        }
        .btn-save:hover { background: var(--accent-hover); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Responsive Adjustments */
        @media (max-width: 768px) {
            .navbar {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
                height: auto;
                position: relative;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }
            .nav-links h2 { margin-right: 0 !important; width: 100%; justify-content: center; margin-bottom: 0.5rem; }
            .user-actions { width: 100%; justify-content: space-between; }
            
            .main-wrapper {
                margin-top: 20px;
                padding: 1rem;
            }
            .header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
            .header h1 { font-size: 1.5rem; }
            .btn-primary { width: 100%; justify-content: center; }

            .table-container {
                overflow-x: auto;
            }
            table {
                min-width: 600px; /* Ensure table doesn't get too squished */
            }

            .modal {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-links">
            <h2 style="font-size:1.2rem;margin-right:2rem;display:flex;align-items:center;gap:8px;">
                <svg style="width:20px;height:20px;color:var(--accent-color)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Secure Access
            </h2>
            <a href="/login">Login</a>
            <a href="/users" class="active">Users</a>
            <a href="/firewall-test">Policy Simulator</a>
        </div>
        <div class="user-actions">
            <div id="currentUser">
                <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span id="usernameDisplay">Loading...</span>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="main-wrapper">
        <div class="header">
            <h1>User Management</h1>
            <button class="btn-primary" onclick="openAddUserForm()">
                <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add New User
            </button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th style="text-align:right">Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>
    </div>
    
    <!-- Add/Edit Modal -->
    <div id="userModal" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitle">Add New User</h2>
            <form id="userForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="formUsername" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="formEmail" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label id="passwordLabel">Password</label>
                    <input type="password" id="formPassword" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="formRole">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeUserModal()">Cancel</button>
                    <button type="submit" class="btn-save">Save User</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Whitelist Modal -->
    <div id="whitelistModal" class="modal-overlay">
        <div class="modal" style="max-width: 600px;">
            <h2 style="margin-bottom: 1rem;">Manage URLs for <span id="wlUsername" style="color:var(--accent-color)"></span></h2>
            <div style="max-height: 200px; overflow-y: auto; margin-bottom: 1.5rem; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 1rem;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">
                    <thead>
                        <tr>
                            <th style="padding:0.5rem;text-align:left">URL</th>
                            <th style="padding:0.5rem;text-align:left">Method</th>
                            <th style="padding:0.5rem;text-align:center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="wlTableBody"></tbody>
                </table>
            </div>
            <form id="wlForm">
                <div class="form-group">
                    <label>New URL</label>
                    <input type="url" id="wlUrl" placeholder="https://api.example.com/data" required>
                </div>
                <div style="display:flex; gap:1rem;">
                    <div class="form-group" style="flex:1;">
                        <label>Method</label>
                        <select id="wlMethod">
                            <option value="GET">GET</option><option value="POST">POST</option>
                            <option value="PUT">PUT</option><option value="DELETE">DELETE</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:2;">
                        <label>Description</label>
                        <input type="text" id="wlDesc" placeholder="e.g. Read Data API" required>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeWhitelistModal()">Close</button>
                    <button type="submit" class="btn-save">Add URL</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        let currentUserId = null;
        let isEditMode = false;
        
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(sessionStorage.getItem('currentUser'));
            if (user) {
                if (user.role !== 'ADMIN') {
                    window.location.href = '/my-access';
                    return;
                }
                document.getElementById('usernameDisplay').textContent = user.username;
                loadUsers();
            } else {
                window.location.href = '/login';
            }
        });
        
        function loadUsers() {
            // Include token if stored
            const headers = {};
            const token = sessionStorage.getItem('token');
            if (token) {
                headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;
            }

            fetch('/api/users', { headers })
                .then(response => {
                    if (response.status === 401 || response.status === 403) {
                        logout();
                        throw new Error('Unauthorized');
                    }
                    return response.json();
                })
                .then(data => {
                    const tbody = document.getElementById('usersTableBody');
                    tbody.innerHTML = '';
                    
                    if (data.data && data.data.length > 0) {
                        data.data.forEach(user => {
                            const row = document.createElement('tr');
                            const createdDate = new Date(user.createdAt).toLocaleDateString(undefined, {year: 'numeric', month: 'short', day: 'numeric'});
                            
                            row.innerHTML = `
                                <td><span style="color:var(--text-secondary);font-family:monospace">#${user.id}</span></td>
                                <td>
                                    <div style="font-weight:500">${user.username}</div>
                                    <div style="font-size:0.8rem;color:var(--text-secondary)">${user.email}</div>
                                </td>
                                <td><span class="badge badge-${user.role.toLowerCase()}">${user.role}</span></td>
                                <td><span class="badge badge-${user.isActive ? 'active' : 'inactive'}">${user.isActive ? 'Active' : 'Inactive'}</span></td>
                                <td>${createdDate}</td>
                                <td>
                                    <div class="actions" style="justify-content:flex-end">
                                        <button class="btn-action" style="color:var(--success-text);border-color:rgba(16,185,129,0.3)" onclick="openWhitelistModal(${user.id}, '${user.username}')" title="Manage URLs">
                                            <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                        </button>
                                        <button class="btn-action edit" onclick="editUser(${user.id})" title="Edit">
                                            <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                        </button>
                                        <button class="btn-action delete" onclick="deleteUser(${user.id})" title="Delete">
                                            <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                        </button>
                                    </div>
                                </td>
                            `;
                            tbody.appendChild(row);
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-message">No users found in the system.</td></tr>';
                    }
                })
                .catch(err => console.error(err));
        }
        
        function openAddUserForm() {
            isEditMode = false;
            currentUserId = null;
            document.getElementById('modalTitle').textContent = 'Add New User';
            document.getElementById('userForm').reset();
            document.getElementById('passwordLabel').textContent = 'Password';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('formPassword').required = true;
            document.getElementById('userModal').style.display = 'flex';
        }
        
        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
        }
        
        function editUser(id) {
            const headers = {};
            const token = sessionStorage.getItem('token');
            if (token) headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;

            fetch(`/api/users/${id}`, { headers })
                .then(response => response.json())
                .then(data => {
                    const user = data.data;
                    isEditMode = true;
                    currentUserId = id;
                    document.getElementById('modalTitle').textContent = 'Edit User';
                    document.getElementById('formUsername').value = user.username;
                    document.getElementById('formEmail').value = user.email;
                    document.getElementById('formRole').value = user.role;
                    document.getElementById('formPassword').value = '';
                    document.getElementById('formPassword').required = false;
                    document.getElementById('passwordLabel').textContent = 'New Password (Leave blank to keep current)';
                    document.getElementById('passwordGroup').style.display = 'block';
                    document.getElementById('userModal').style.display = 'flex';
                });
        }
        
        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userData = {
                username: document.getElementById('formUsername').value,
                email: document.getElementById('formEmail').value,
                role: document.getElementById('formRole').value
            };
            
            if (!isEditMode) {
                userData.password = document.getElementById('formPassword').value;
            }
            
            const url = isEditMode ? `/api/users/${currentUserId}` : '/api/users';
            const method = isEditMode ? 'PUT' : 'POST';
            
            const headers = { 'Content-Type': 'application/json' };
            const token = sessionStorage.getItem('token');
            if (token) headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: headers,
                    body: JSON.stringify(userData)
                });
                
                if (response.ok) {
                    closeUserModal();
                    loadUsers();
                } else {
                    alert('Failed to save user. Check permissions.');
                }
            } catch (error) {
                alert('Connection error occurred');
            }
        });
        
        function deleteUser(id) {
            if (confirm('Are you sure you want to permanently delete this user?')) {
                const headers = {};
                const token = sessionStorage.getItem('token');
                if (token) headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;

                fetch(`/api/users/${id}`, { method: 'DELETE', headers })
                .then(response => {
                    if (response.ok) {
                        loadUsers();
                    } else {
                        alert('Failed to delete user. Check permissions.');
                    }
                });
            }
        }
        
        function logout() {
            sessionStorage.removeItem('currentUser');
            sessionStorage.removeItem('token');
            window.location.href = '/login';
        }

        // --- Whitelist Logic ---
        let currentWlUserId = null;
        
        function openWhitelistModal(userId, username) {
            currentWlUserId = userId;
            document.getElementById('wlUsername').textContent = username;
            document.getElementById('wlForm').reset();
            document.getElementById('whitelistModal').style.display = 'flex';
            loadWhitelistsForUser(userId);
        }

        function closeWhitelistModal() {
            document.getElementById('whitelistModal').style.display = 'none';
        }

        function loadWhitelistsForUser(userId) {
            const headers = {};
            const token = sessionStorage.getItem('token');
            if (token) headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;

            fetch(`/api/whitelist/admin/user/${userId}`, { headers })
                .then(r => r.json())
                .then(urls => {
                    const tbody = document.getElementById('wlTableBody');
                    tbody.innerHTML = '';
                    if(urls && urls.length > 0) {
                        urls.forEach(u => {
                            tbody.innerHTML += `<tr>
                                <td style="padding: 0.5rem; border-bottom: 1px solid var(--border-color); font-family:monospace;">${u.url}</td>
                                <td style="padding: 0.5rem; border-bottom: 1px solid var(--border-color);"><span class="badge badge-active">${u.httpMethod}</span></td>
                                <td style="padding: 0.5rem; border-bottom: 1px solid var(--border-color); text-align:center;">
                                    <button type="button" class="btn-action delete" style="padding:0.2rem; display:inline-flex;" onclick="deleteWhitelist(${u.id}, ${userId})" title="Delete URL">
                                        <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    </button>
                                </td>
                            </tr>`;
                        });
                    } else {
                        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:1rem;color:var(--text-secondary)">No URLs found for this user.</td></tr>';
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('wlTableBody').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:1rem;color:var(--error-text)">Failed to load URLs (Admin access required).</td></tr>';
                });
        }

        function deleteWhitelist(wlId, userId) {
            if(!confirm('Delete this URL rule?')) return;
            const headers = {};
            const token = sessionStorage.getItem('token');
            if (token) headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;
            
            fetch(`/api/whitelist/${wlId}`, { method: 'DELETE', headers })
                .then(r => {
                    if(r.ok) loadWhitelistsForUser(userId);
                    else alert('Failed to delete URL');
                });
        }

        document.getElementById('wlForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                url: document.getElementById('wlUrl').value,
                httpMethod: document.getElementById('wlMethod').value,
                description: document.getElementById('wlDesc').value
            };
            const headers = { 'Content-Type': 'application/json' };
            const token = sessionStorage.getItem('token');
            if (token) headers['Authorization'] = token.startsWith('Bearer ') ? token : 'Bearer ' + token;

            const res = await fetch(`/api/whitelist/admin/add/${currentWlUserId}`, {
                method: 'POST',
                headers,
                body: JSON.stringify(data)
            });
            if(res.ok) {
                document.getElementById('wlForm').reset();
                loadWhitelistsForUser(currentWlUserId);
            } else {
                alert('Failed to add URL');
            }
        });
    </script>
</body>
</html>
