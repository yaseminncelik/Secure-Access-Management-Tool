<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Secure Access Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --success-bg: rgba(16, 185, 129, 0.1);
            --success-text: #34d399;
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-text: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .forgot-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { text-align: center; font-weight: 700; font-size: 1.8rem; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h1 svg { color: var(--accent-color); }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; }
        input { width: 100%; padding: 0.85rem 1rem; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 0.95rem; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: var(--accent-color); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        button { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--accent-color) 0%, #4f46e5 100%); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 1rem; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        .error-message, .success-message { padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; font-size: 0.9rem; text-align: center; }
        .error-message { background: var(--error-bg); color: var(--error-text); border: 1px solid rgba(239, 68, 68, 0.2); }
        .success-message { background: var(--success-bg); color: var(--success-text); border: 1px solid rgba(16, 185, 129, 0.2); }

        .footer-text { text-align: center; color: var(--text-secondary); margin-top: 1.5rem; font-size: 0.85rem; }
        .footer-text a { color: var(--accent-color); text-decoration: none; font-weight: 600; }

        @media (max-width: 480px) {
            .forgot-container { padding: 1.5rem; margin: 1rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <h1>
            <svg style="width:28px;height:28px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            Reset Password
        </h1>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="forgotForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="johndoe" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
            
            <button type="submit">Reset My Password</button>
        </form>
        
        <div class="footer-text">
            Remembered your password? <a href="/login">Sign In</a>
        </div>
    </div>
    
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            const btn = e.target.querySelector('button');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            btn.innerHTML = 'Resetting...';
            btn.disabled = true;
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.textContent = 'Password reset successful! Redirecting to login...';
                    successDiv.style.display = 'block';
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    errorDiv.textContent = data.message || 'Reset failed. Check your info.';
                    errorDiv.style.display = 'block';
                    btn.innerHTML = 'Reset My Password';
                    btn.disabled = false;
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error occurred';
                errorDiv.style.display = 'block';
                btn.innerHTML = 'Reset My Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
