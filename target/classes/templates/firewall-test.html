<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall Test - Secure Access Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .result-message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 20px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/login">Login</a>
        <a href="/users">Users</a>
        <a href="/firewall-test">Firewall Test</a>
    </div>

    <div class="container">
        <h1>🔥 Firewall Test</h1>

        <div id="resultMessage" class="result-message"></div>

        <form id="firewallForm">
            <div class="form-group">
                <label for="targetUrl">Target URL:</label>
                <input type="url" id="targetUrl" name="targetUrl" placeholder="https://example.com" required>
            </div>

            <div class="form-group">
                <label for="token">JWT Token:</label>
                <textarea id="token" name="token" placeholder="Enter your JWT token here..." required></textarea>
            </div>

            <button type="submit">Test Access</button>
        </form>

        <div class="info-text">
            <p><strong>How to use:</strong></p>
            <ol>
                <li>Login to get your JWT token</li>
                <li>Enter the target URL you want to access</li>
                <li>Paste your JWT token</li>
                <li>Click "Test Access" to check if access is allowed</li>
            </ol>
        </div>
    </div>

    <script>
        document.getElementById('firewallForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const targetUrl = document.getElementById('targetUrl').value;
            const token = document.getElementById('token').value;
            const resultDiv = document.getElementById('resultMessage');

            // Clear previous messages
            resultDiv.style.display = 'none';
            resultDiv.className = 'result-message';

            try {
                const response = await fetch('/api/redirect/url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token
                    },
                    body: JSON.stringify({
                        targetUrl: targetUrl,
                        httpMethod: 'GET'
                    })
                });

                const data = await response.json();

                resultDiv.style.display = 'block';

                if (response.ok) {
                    resultDiv.className = 'result-message success';
                    resultDiv.innerHTML = `
                        <strong>✅ Access Granted!</strong><br>
                        Status: ${data.status}<br>
                        Message: ${data.message}<br>
                        Redirect URL: ${data.redirectUrl || 'N/A'}
                    `;
                } else {
                    resultDiv.className = 'result-message error';
                    resultDiv.innerHTML = `
                        <strong>❌ Access Denied!</strong><br>
                        Status: ${data.status}<br>
                        Message: ${data.message}
                    `;
                }

            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result-message error';
                resultDiv.innerHTML = `
                    <strong>❌ Error!</strong><br>
                    Failed to test access: ${error.message}
                `;
            }
        });
    </script>
</body>
</html>
